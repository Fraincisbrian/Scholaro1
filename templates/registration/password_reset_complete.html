{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Password Updated - Scholaro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-card text-center">
    <div class="mb-3">
        <img src="{% static 'images/scholaro-logo.png' %}" alt="Scholaro" style="max-height: 56px; width: auto;">
    </div>
    <i class="bi bi-check-circle" style="font-size: 2.5rem; color: var(--sw-green);"></i>
    <h1 class="auth-title mt-3">Password updated</h1>
    <p class="auth-subtitle">Your password has been changed successfully.</p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100 sign-in-btn">Sign In</a>
</div>
</body>
</html>
